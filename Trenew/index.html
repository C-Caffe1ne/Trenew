<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trenew : 실시간 트렌드</title>
    <link rel="stylesheet" href="style.css">
    <meta http-equiv="refresh" content="300">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7306204710035483"
        crossorigin="anonymous"></script>
</head>

<body>
    <div class="app-container">
        <main class="main-content">

            <!-- 상단 섹션: 나무위키 트렌드 & 뉴스 -->
            <section class="card namu-section">
                <div class="section-header">
                    <div>
                        <h4>
                            실시간 트렌드
                        </h4>
                        <h1 style="font-size: 52px;"><span style="color: #207a41;">T</span><span
                                style="color: #277f48;">r</span><span style="color: #3d8558;">e</span><span
                                style="color: #508564;">n</span><span style="color: #70987f;">e</span><span
                                style="color: rgb(148, 210, 170);">w</span></h1>
                    </div>
                </div>
                <div>
                    <div class="update-container">
                        <button class="refresh-btn" onclick="handleRefresh()">
                            <svg class="refresh-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16"
                                viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                                stroke-linecap="round" stroke-linejoin="round">
                                <polyline points="23 4 23 10 17 10"></polyline>
                                <polyline points="1 20 1 14 7 14"></polyline>
                                <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
                            </svg>
                            새로고침
                        </button>
                        <br><br>
                        <p class="time-display">
                            마지막 업데이트 : (UTC+09:00)<span id="lastUpdateTime">-</span>
                        </p>
                        <br>
                        <a href="https://arca.live/b/namuhotnow" target="_blank" class="namuNow">
                            <img class="namu-link" src="./img/Namuissue.png" width="24" height="24"> 나무위키 실검 알려주는
                            채널</a><br><br>
                        <a href="https://namu.wiki/"><img src="./img/namuWiki.png" width="15%" height="15%"
                                style="display: flex; justify-content: center; align-items: center;"></a>
                    </div>

                    <script>
                        // A. 페이지가 로드되자마자 실행되는 함수
                        window.onload = function () {
                            const now = new Date();

                            // 시, 분, 초를 두 자리 숫자로 맞춤 (예: 09:05:01)
                            const hours = String(now.getHours()).padStart(2, '0');
                            const minutes = String(now.getMinutes()).padStart(2, '0');
                            const seconds = String(now.getSeconds()).padStart(2, '0');

                            const timeString = `${hours}:${minutes}:${seconds}`;

                            // 화면에 시간 표시
                            document.getElementById('lastUpdateTime').textContent = timeString;
                        };

                        // B. 버튼 클릭 시 실행되는 함수
                        function handleRefresh() {
                            const icon = document.querySelector('.refresh-icon');
                            if (icon) {
                                icon.classList.add('spinning');
                            }
                            // 애니메이션이 보인 후 새로고침
                            setTimeout(() => {
                                location.reload();
                            }, 600);
                        }
                    </script>
                </div>

                <div class="grid-2">
                    <!-- 1~5위 카드 -->
                    <div class="sub-card">
                        <h3 class="nowIssue">실시간 검색어</h3>
                        <div class="trend-lists-wrapper"
                            style="display: flex; gap: 1rem; justify-content: space-around; padding: 0 1rem;">
                            <ul class="trend-list" id="namu-trend-list-1" style="flex: 1; padding: 0;">
                                <li class="trend-item skeleton">
                                    <div class="skeleton-rank"></div>
                                    <div class="skeleton-text"></div>
                                </li>
                                <li class="trend-item skeleton">
                                    <div class="skeleton-rank"></div>
                                    <div class="skeleton-text" style="width: 70%;"></div>
                                </li>
                                <li class="trend-item skeleton">
                                    <div class="skeleton-rank"></div>
                                    <div class="skeleton-text" style="width: 85%;"></div>
                                </li>
                                <li class="trend-item skeleton">
                                    <div class="skeleton-rank"></div>
                                    <div class="skeleton-text" style="width: 60%;"></div>
                                </li>
                                <li class="trend-item skeleton">
                                    <div class="skeleton-rank"></div>
                                    <div class="skeleton-text" style="width: 90%;"></div>
                                </li>
                            </ul>
                            <ul class="trend-list" id="namu-trend-list-2" style="flex: 1; padding: 0;">
                                <li class="trend-item skeleton">
                                    <div class="skeleton-rank"></div>
                                    <div class="skeleton-text" style="width: 75%;"></div>
                                </li>
                                <li class="trend-item skeleton">
                                    <div class="skeleton-rank"></div>
                                    <div class="skeleton-text" style="width: 65%;"></div>
                                </li>
                                <li class="trend-item skeleton">
                                    <div class="skeleton-rank"></div>
                                    <div class="skeleton-text" style="width: 80%;"></div>
                                </li>
                                <li class="trend-item skeleton">
                                    <div class="skeleton-rank"></div>
                                    <div class="skeleton-text" style="width: 55%;"></div>
                                </li>
                                <li class="trend-item skeleton">
                                    <div class="skeleton-rank"></div>
                                    <div class="skeleton-text" style="width: 70%;"></div>
                                </li>
                            </ul>
                        </div>
                    </div>

                    <!-- 환율 카드 -->
                    <div id="exchange-wrapper" class="sub-card"
                        style="display: flex; flex-direction: column; position: relative; overflow: hidden;">
                        <h3 class="exchange"
                            style="display: flex; align-items: center; justify-content: center; gap: 0.5rem;">
                            국제 환율(KRW)
                        </h3>
                        <div class="exchange-content"
                            style="flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 2rem 0;">
                            <div class="skeleton-text" style="width: 60%; height: 3rem; margin-bottom: 1rem;"></div>
                            <div class="skeleton-text" style="width: 80%; height: 4rem;"></div>
                        </div>
                    </div>
                </div>
            </section>

            <!-- 하단 섹션: 소셜 미디어 트렌드 -->
            <section class="grid-2 mt-6">

                <!-- KOSPI 지수 -->
                <div class="card social-card kospi-card">
                    <div class="social-header text-blue">
                        <div class="icon-wrapper" style="color: #d63031;">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round">
                                <polyline points="22 7 13.5 15.5 8.5 10.5 2 17"></polyline>
                                <polyline points="16 7 22 7 22 13"></polyline>
                            </svg>
                        </div>
                        <h2 class="text-black">KOSPI 지수</h2>
                    </div>
                    <div class="kospi-carousel" id="kospi-carousel">
                        <div class="kospi-carousel-track" id="kospi-carousel-track">
                            <!-- 캐러셀 페이지가 JS로 삽입됩니다 -->
                            <div class="kospi-page">
                                <table class="kospi-table skeleton-table">
                                    <thead><tr><th>지수명</th><th>종가</th><th>대비</th><th>등락률</th></tr></thead>
                                    <tbody>
                                        <tr><td><div class="skeleton-text" style="width:80%"></div></td><td><div class="skeleton-text" style="width:60%"></div></td><td><div class="skeleton-text" style="width:50%"></div></td><td><div class="skeleton-text" style="width:50%"></div></td></tr>
                                        <tr><td><div class="skeleton-text" style="width:70%"></div></td><td><div class="skeleton-text" style="width:55%"></div></td><td><div class="skeleton-text" style="width:45%"></div></td><td><div class="skeleton-text" style="width:55%"></div></td></tr>
                                        <tr><td><div class="skeleton-text" style="width:85%"></div></td><td><div class="skeleton-text" style="width:65%"></div></td><td><div class="skeleton-text" style="width:40%"></div></td><td><div class="skeleton-text" style="width:60%"></div></td></tr>
                                        <tr><td><div class="skeleton-text" style="width:75%"></div></td><td><div class="skeleton-text" style="width:50%"></div></td><td><div class="skeleton-text" style="width:55%"></div></td><td><div class="skeleton-text" style="width:45%"></div></td></tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                        <div class="kospi-carousel-controls">
                            <button class="kospi-carousel-btn kospi-prev" id="kospi-prev" aria-label="이전">‹</button>
                            <div class="kospi-carousel-dots" id="kospi-dots"></div>
                            <button class="kospi-carousel-btn kospi-next" id="kospi-next" aria-label="다음">›</button>
                        </div>
                    </div>
                </div>

                <!-- YouTube 트렌드 -->
                <div class="card social-card" style="flex: 1;">
                    <div class="social-header text-red">
                        <div class="icon-wrapper" style="color: #FF0000; fill: #FF0000;">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
                                fill="currentColor">
                                <path
                                    d="M21.582 6.186a2.766 2.766 0 0 0-1.946-1.954C17.917 3.75 12 3.75 12 3.75s-5.918 0-7.636.482a2.766 2.766 0 0 0-1.946 1.954C2 7.915 2 12 2 12s0 4.085.418 5.814a2.766 2.766 0 0 0 1.946 1.954C6.082 20.25 12 20.25 12 20.25s5.918 0 7.636-.482a2.766 2.766 0 0 0 1.946-1.954C22 16.085 22 12 22 12s0-4.085-.418-5.814zM9.75 15.021V8.979L15.5 12l-5.75 3.021z">
                                </path>
                            </svg>
                        </div>
                        <h2 class="text-black">YouTube 인기</h2>
                    </div>
                    <ul class="trend-list" id="youtube-trend-list">
                        <li class="trend-item skeleton" style="height: 50px;">
                            <div class="skeleton-rank"></div>
                            <div class="skeleton-image"
                                style="width: 80px; height: 45px; background: #e5e7eb; border-radius: 4px; animation: shimmer 1.5s infinite linear alternate;">
                            </div>
                            <div style="flex: 1; display: flex; flex-direction: column; gap: 8px;">
                                <div class="skeleton-text" style="width:90%"></div>
                                <div class="skeleton-text" style="width:60%; height: 10px;"></div>
                            </div>
                        </li>
                        <li class="trend-item skeleton" style="height: 50px;">
                            <div class="skeleton-rank"></div>
                            <div class="skeleton-image"
                                style="width: 80px; height: 45px; background: #e5e7eb; border-radius: 4px; animation: shimmer 1.5s infinite linear alternate;">
                            </div>
                            <div style="flex: 1; display: flex; flex-direction: column; gap: 8px;">
                                <div class="skeleton-text" style="width:85%"></div>
                                <div class="skeleton-text" style="width:50%; height: 10px;"></div>
                            </div>
                        </li>
                        <li class="trend-item skeleton" style="height: 50px;">
                            <div class="skeleton-rank"></div>
                            <div class="skeleton-image"
                                style="width: 80px; height: 45px; background: #e5e7eb; border-radius: 4px; animation: shimmer 1.5s infinite linear alternate;">
                            </div>
                            <div style="flex: 1; display: flex; flex-direction: column; gap: 8px;">
                                <div class="skeleton-text" style="width:75%"></div>
                                <div class="skeleton-text" style="width:55%; height: 10px;"></div>
                            </div>
                        </li>
                        <li class="trend-item skeleton" style="height: 50px;">
                            <div class="skeleton-rank"></div>
                            <div class="skeleton-image"
                                style="width: 80px; height: 45px; background: #e5e7eb; border-radius: 4px; animation: shimmer 1.5s infinite linear alternate;">
                            </div>
                            <div style="flex: 1; display: flex; flex-direction: column; gap: 8px;">
                                <div class="skeleton-text" style="width:80%"></div>
                                <div class="skeleton-text" style="width:40%; height: 10px;"></div>
                            </div>
                        </li>
                        <li class="trend-item skeleton" style="height: 50px;">
                            <div class="skeleton-rank"></div>
                            <div class="skeleton-image"
                                style="width: 80px; height: 45px; background: #e5e7eb; border-radius: 4px; animation: shimmer 1.5s infinite linear alternate;">
                            </div>
                            <div style="flex: 1; display: flex; flex-direction: column; gap: 8px;">
                                <div class="skeleton-text" style="width:70%"></div>
                                <div class="skeleton-text" style="width:65%; height: 10px;"></div>
                            </div>
                        </li>
                    </ul>
                </div>

            </section>
        </main>
    </div>
    <script src="namu_api.js"></script>
    <script src="social_api.js"></script>
    <script src="exchange.js"></script>
</body>

</html>
