<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trenew : 실시간 트렌드</title>
    <link rel="stylesheet" href="style.css">
    <meta http-equiv="refresh" content="300">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7306204710035483"
        crossorigin="anonymous"></script>
</head>

<body>
    <div class="app-container">
        <main class="main-content">

            <!-- 상단 섹션: 나무위키 트렌드 & 뉴스 -->
            <section class="card namu-section">
                <div class="section-header">
                    <a href="https://namu.wiki/"><img src="./img/namuWiki.png" width="50%" height="50%"></a>
                </div>
                <div>
                    <div class="update-container">
                        <button class="refresh-btn" onclick="handleRefresh()">새로고침</button>
                        <br><br>
                        <p class="time-display">
                            마지막 업데이트 : (UTC+09:00) <span id="lastUpdateTime">-</span>
                        </p>
                        <br>
                        <a href="https://arca.live/b/namuhotnow" target="_blank" class="namuNow">
                            <img src="./img/Namuissue.png" width="24" height="24"> 나무위키 실검 알려주는 채널</a>
                    </div>

                    <script>
                        // A. 페이지가 로드되자마자 실행되는 함수
                        window.onload = function () {
                            const now = new Date();

                            // 시, 분, 초를 두 자리 숫자로 맞춤 (예: 09:05:01)
                            const hours = String(now.getHours()).padStart(2, '0');
                            const minutes = String(now.getMinutes()).padStart(2, '0');
                            const seconds = String(now.getSeconds()).padStart(2, '0');

                            const timeString = `${hours}:${minutes}:${seconds}`;

                            // 화면에 시간 표시
                            document.getElementById('lastUpdateTime').textContent = timeString;
                        };

                        // B. 버튼 클릭 시 실행되는 함수
                        function handleRefresh() {
                            // 브라우저 페이지 새로고침
                            location.reload();
                        }
                    </script>
                </div>

                <div class="grid-2">
                    <!-- 1~5위 카드 -->
                    <div class="sub-card">
                        <h3 class="nowIssue">실시간 검색어</h3>
                        <div class="trend-lists-wrapper"
                            style="display: flex; gap: 1rem; justify-content: space-around; padding: 0 1rem;">
                            <ul class="trend-list" id="namu-trend-list-1" style="flex: 1; padding: 0;">
                                <li class="trend-item skeleton">
                                    <div class="skeleton-rank"></div>
                                    <div class="skeleton-text"></div>
                                </li>
                                <li class="trend-item skeleton">
                                    <div class="skeleton-rank"></div>
                                    <div class="skeleton-text" style="width: 70%;"></div>
                                </li>
                                <li class="trend-item skeleton">
                                    <div class="skeleton-rank"></div>
                                    <div class="skeleton-text" style="width: 85%;"></div>
                                </li>
                                <li class="trend-item skeleton">
                                    <div class="skeleton-rank"></div>
                                    <div class="skeleton-text" style="width: 60%;"></div>
                                </li>
                                <li class="trend-item skeleton">
                                    <div class="skeleton-rank"></div>
                                    <div class="skeleton-text" style="width: 90%;"></div>
                                </li>
                            </ul>
                            <ul class="trend-list" id="namu-trend-list-2" style="flex: 1; padding: 0;">
                                <li class="trend-item skeleton">
                                    <div class="skeleton-rank"></div>
                                    <div class="skeleton-text" style="width: 75%;"></div>
                                </li>
                                <li class="trend-item skeleton">
                                    <div class="skeleton-rank"></div>
                                    <div class="skeleton-text" style="width: 65%;"></div>
                                </li>
                                <li class="trend-item skeleton">
                                    <div class="skeleton-rank"></div>
                                    <div class="skeleton-text" style="width: 80%;"></div>
                                </li>
                                <li class="trend-item skeleton">
                                    <div class="skeleton-rank"></div>
                                    <div class="skeleton-text" style="width: 55%;"></div>
                                </li>
                                <li class="trend-item skeleton">
                                    <div class="skeleton-rank"></div>
                                    <div class="skeleton-text" style="width: 70%;"></div>
                                </li>
                            </ul>
                        </div>
                    </div>

                    <!-- 뉴스 카드 -->
                    <div id="news-wrapper">
                        <div class="news-image-wrapper">
                            <h3>Delay +12h</h3>
                            <img src="https://images.unsplash.com/photo-1579532537902-1e50099867b4?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&ixid=M3w3Nzg4Nzd8MHwxfHNlYXJjaHwxfHx0ZWNobm9sb2d5JTIwbmV3c3xlbnwxfHx8fDE3NzQ1MDg3ODd8MA&ixlib=rb-4.1.0&q=80&w=1080"
                                alt="Technology News" class="news-image">
                            <div class="news-badge">IT/과학</div>
                        </div>
                        <div class="news-content">
                            <div>
                                <h3 class="news-title">혁신적인 AI 기술, IT 업계의 새로운 패러다임 제시</h3>
                                <p class="news-desc">최근 공개된 새로운 인공지능 모델이 개발자들과 기업들 사이에서 큰 화제를 모으고 있습니다. 기존의 한계를 뛰어넘는 추론
                                    능력과 처리 속도로 인해 다양한 산업군에서의 활용이 기대되며...</p>
                            </div>
                            <div class="news-meta">2026. 03. 26 · 5분 전</div>
                        </div>
                    </div>
                </div>
            </section>

            <!-- 하단 섹션: 소셜 미디어 트렌드 -->
            <section class="grid-2 mt-6">

                <!-- X 트렌드 -->
                <div class="card social-card">
                    <div class="social-header text-blue">
                        <div class="icon-wrapper">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round">
                                <path
                                    d="M22 4s-.7 2.1-2 3.4c1.6 10-9.4 17.3-18 11.6 2.2.1 4.4-.6 6-2C3 15.5.5 9.6 3 5c2.2 2.6 5.6 4.1 9 4-.9-4.2 4-6.6 7-3.8 1.1 0 3-1.2 3-1.2z">
                                </path>
                            </svg>
                        </div>
                        <h2 class="text-black">X 트렌드</h2>
                    </div>
                    <ul class="trend-list" id="x-trend-list">
                        <li class="trend-item skeleton">
                            <div class="skeleton-rank"></div>
                            <div class="skeleton-text"></div>
                        </li>
                        <li class="trend-item skeleton">
                            <div class="skeleton-rank"></div>
                            <div class="skeleton-text" style="width:70%"></div>
                        </li>
                        <li class="trend-item skeleton">
                            <div class="skeleton-rank"></div>
                            <div class="skeleton-text" style="width:85%"></div>
                        </li>
                        <li class="trend-item skeleton">
                            <div class="skeleton-rank"></div>
                            <div class="skeleton-text" style="width:60%"></div>
                        </li>
                        <li class="trend-item skeleton">
                            <div class="skeleton-rank"></div>
                            <div class="skeleton-text" style="width:75%"></div>
                        </li>
                    </ul>
                </div>

                <!-- YouTube 트렌드 -->
                <div class="card social-card" style="flex: 1;">
                    <div class="social-header text-red">
                        <div class="icon-wrapper" style="color: #FF0000; fill: #FF0000;">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
                                fill="currentColor">
                                <path
                                    d="M21.582 6.186a2.766 2.766 0 0 0-1.946-1.954C17.917 3.75 12 3.75 12 3.75s-5.918 0-7.636.482a2.766 2.766 0 0 0-1.946 1.954C2 7.915 2 12 2 12s0 4.085.418 5.814a2.766 2.766 0 0 0 1.946 1.954C6.082 20.25 12 20.25 12 20.25s5.918 0 7.636-.482a2.766 2.766 0 0 0 1.946-1.954C22 16.085 22 12 22 12s0-4.085-.418-5.814zM9.75 15.021V8.979L15.5 12l-5.75 3.021z">
                                </path>
                            </svg>
                        </div>
                        <h2 class="text-black">YouTube 인기</h2>
                    </div>
                    <ul class="trend-list" id="youtube-trend-list">
                        <li class="trend-item skeleton" style="height: 50px;">
                            <div class="skeleton-rank"></div>
                            <div class="skeleton-image"
                                style="width: 80px; height: 45px; background: #e5e7eb; border-radius: 4px; animation: shimmer 1.5s infinite linear alternate;">
                            </div>
                            <div style="flex: 1; display: flex; flex-direction: column; gap: 8px;">
                                <div class="skeleton-text" style="width:90%"></div>
                                <div class="skeleton-text" style="width:60%; height: 10px;"></div>
                            </div>
                        </li>
                        <li class="trend-item skeleton" style="height: 50px;">
                            <div class="skeleton-rank"></div>
                            <div class="skeleton-image"
                                style="width: 80px; height: 45px; background: #e5e7eb; border-radius: 4px; animation: shimmer 1.5s infinite linear alternate;">
                            </div>
                            <div style="flex: 1; display: flex; flex-direction: column; gap: 8px;">
                                <div class="skeleton-text" style="width:85%"></div>
                                <div class="skeleton-text" style="width:50%; height: 10px;"></div>
                            </div>
                        </li>
                        <li class="trend-item skeleton" style="height: 50px;">
                            <div class="skeleton-rank"></div>
                            <div class="skeleton-image"
                                style="width: 80px; height: 45px; background: #e5e7eb; border-radius: 4px; animation: shimmer 1.5s infinite linear alternate;">
                            </div>
                            <div style="flex: 1; display: flex; flex-direction: column; gap: 8px;">
                                <div class="skeleton-text" style="width:75%"></div>
                                <div class="skeleton-text" style="width:55%; height: 10px;"></div>
                            </div>
                        </li>
                        <li class="trend-item skeleton" style="height: 50px;">
                            <div class="skeleton-rank"></div>
                            <div class="skeleton-image"
                                style="width: 80px; height: 45px; background: #e5e7eb; border-radius: 4px; animation: shimmer 1.5s infinite linear alternate;">
                            </div>
                            <div style="flex: 1; display: flex; flex-direction: column; gap: 8px;">
                                <div class="skeleton-text" style="width:80%"></div>
                                <div class="skeleton-text" style="width:40%; height: 10px;"></div>
                            </div>
                        </li>
                        <li class="trend-item skeleton" style="height: 50px;">
                            <div class="skeleton-rank"></div>
                            <div class="skeleton-image"
                                style="width: 80px; height: 45px; background: #e5e7eb; border-radius: 4px; animation: shimmer 1.5s infinite linear alternate;">
                            </div>
                            <div style="flex: 1; display: flex; flex-direction: column; gap: 8px;">
                                <div class="skeleton-text" style="width:70%"></div>
                                <div class="skeleton-text" style="width:65%; height: 10px;"></div>
                            </div>
                        </li>
                    </ul>
                </div>

            </section>
        </main>
    </div>
    <script src="namu_api.js"></script>
    <script src="social_api.js"></script>
    <script type="module" src="news.js"></script>
</body>

</html>
